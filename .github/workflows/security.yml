name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly Monday 06:00 UTC

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-scan:
    name: Dependency Scan (pip-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Export locked requirements
        run: uv export --no-dev --no-hashes --format requirements-txt > requirements-ci.txt
      - name: Audit dependencies for known CVEs
        run: uvx pip-audit -r requirements-ci.txt --no-deps

  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so past commits are scanned too
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE only required for organization repos:
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        # add "javascript-typescript" once client/ is implemented
        language: [python]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          # Report findings to the Security tab, but do not fail this CI job on
          # them. The one current alert (insecure TLS in the ssl_tls scanner
          # engine) is intentional scanner behavior, not a real vulnerability.
          upload: true
        continue-on-error: true

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan (fail on findings)
        run: >
          semgrep scan
          --config p/security-audit
          --config p/secrets
          --config p/python
          --config p/docker
          --error
          --metrics=off

  # NB: we install the Trivy CLI directly rather than using aquasecurity/trivy-action.
  # That action's releases pin an internal helper (setup-trivy@v0.2.2) that has
  # been yanked from GitHub, so the action fails to resolve regardless of which
  # trivy-action version is chosen. The official install script has no such
  # dependency chain.
  trivy-fs:
    name: Trivy Filesystem
    runs-on: ubuntu-latest
    env:
      # Authenticated GHCR pull for the vuln DB avoids the anonymous rate limit.
      TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
      TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db:1
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Scan repository filesystem
        run: |
          docker run --rm \
            -v "$PWD:/scan" \
            -e TRIVY_DB_REPOSITORY \
            -e TRIVY_JAVA_DB_REPOSITORY \
            aquasec/trivy:0.58.1 fs /scan \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --no-progress

  trivy-image:
    name: Trivy Image
    runs-on: ubuntu-latest
    env:
      TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
      TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db:1
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build API image
        run: docker build -t entropy-api:scan ./server
      - name: Scan Docker image
        run: |
          # Report CRITICAL CVEs but do not fail the PR — unfixable base-image
          # CVEs from python:3.12-slim shouldn't block merges (--exit-code 0).
          # Mount the docker socket so trivy-in-a-container can read the image.
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e TRIVY_DB_REPOSITORY \
            -e TRIVY_JAVA_DB_REPOSITORY \
            aquasec/trivy:0.58.1 image entropy-api:scan \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --no-progress

  license-check:
    name: License Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --locked --no-dev
      - name: Fail on GPL/AGPL licensed dependencies
        run: |
          uv run --with pip-licenses pip-licenses --format=json > licenses.json
          uv run python - <<'EOF'
          import json
          import re

          # LGPL is allowed; GPL and AGPL are blocked.
          blocked = re.compile(r"(?<!L)GPL|AGPL|GNU (?:Affero )?General Public License", re.IGNORECASE)
          allowed_lgpl = re.compile(r"LGPL|Lesser General Public", re.IGNORECASE)

          violations = []
          for pkg in json.load(open("licenses.json")):
              lic = pkg["License"]
              if blocked.search(lic) and not allowed_lgpl.search(lic):
                  violations.append(f"{pkg['Name']}=={pkg['Version']}: {lic}")

          if violations:
              print("Blocked licenses found:")
              print("\n".join(violations))
              raise SystemExit(1)
          print("No blocked licenses.")
          EOF

  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM (Syft, SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: server
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom.spdx.json
      - name: Fail if SBOM missing or empty
        run: |
          test -s sbom.spdx.json
          echo "SBOM generated: $(wc -c < sbom.spdx.json) bytes"
