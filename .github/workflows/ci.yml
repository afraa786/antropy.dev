name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --locked
      - name: Import app (startup smoke test)
        run: |
          cp .env.example .env
          uv run python -c "from appsec.main import app; print('FastAPI app imported OK:', app.title)"

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect frontend
        id: detect
        run: |
          if [ -f client/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "client/ is a placeholder (no package.json) — skipping frontend build."
          fi
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.exists == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install and build
        if: steps.detect.outputs.exists == 'true'
        working-directory: client
        run: |
          npm ci
          npm run build

  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --locked
      - name: Ruff lint
        run: uv run ruff check --output-format=github .

  format:
    name: Formatting (Ruff format)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --locked
      - name: Ruff format check
        run: uv run ruff format --check .

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --locked
      - name: Run pytest with coverage
        run: uv run pytest --cov=appsec --cov-report=term-missing

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: server
          push: false
          tags: entropy-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-compose:
    name: Docker Compose Up
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Provide CI env file
        run: cp server/.env.example server/.env
      - name: Start stack
        run: docker compose up -d --build
      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/openapi.json > /dev/null; then
              echo "API is up."
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in 60s."
          exit 1
      - name: Verify all services running
        run: |
          docker compose ps
          exited=$(docker compose ps --status exited --quiet | wc -l)
          if [ "$exited" -ne 0 ]; then
            echo "One or more services exited."
            exit 1
          fi
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs
      - name: Tear down
        if: always()
        run: docker compose down -v

  api-contract:
    name: API Contract (OpenAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --locked
      - name: Export OpenAPI spec
        run: |
          cp .env.example .env
          uv run python -c "import json; from appsec.main import app; open('openapi.json', 'w').write(json.dumps(app.openapi(), indent=2))"
      - name: Validate OpenAPI spec
        run: uv run --with openapi-spec-validator openapi-spec-validator openapi.json
      - name: Upload spec artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: server/openapi.json
