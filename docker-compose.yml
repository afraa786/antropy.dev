services:
  # Local Postgres removed — database is now hosted on Supabase.
  # DATABASE_URL / DATABASE_URL_SYNC come from .env (see api/worker/beat services).

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./server
    env_file: ./server/.env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn appsec.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./server
    env_file: ./server/.env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A appsec.infrastructure.celery_app worker --loglevel=info

  beat:
    build: ./server
    env_file: ./server/.env
    depends_on:
      redis:
        condition: service_healthy

    command: celery -A appsec.infrastructure.celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
